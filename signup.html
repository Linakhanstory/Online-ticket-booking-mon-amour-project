<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Mon Amour Grand</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;800&display=swap"
      rel="stylesheet"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              obsidian: "#0A0A0B",
              cherry: "#1a0404",
              gold: "#D4AF37",
              champagne: "#F9F4F0",
            },
            fontFamily: {
              serif: ["'Cormorant Garamond'", "serif"],
              sans: ["'Plus Jakarta Sans'", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      body {
        font-family: "Cormorant Garamond", serif;
        overflow-x: hidden;
      }

      .stylized-brand {
        font-weight: 700;
        color: #d4af37;
        letter-spacing: -0.01em;
      }

      .btn-shimmer {
        position: relative;
        overflow: hidden;
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        z-index: 1;
      }
      .btn-shimmer::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
        transition: all 0.6s;
      }
      .btn-shimmer:hover::before {
        left: 100%;
      }
      .btn-shimmer:hover {
        letter-spacing: 0.4em;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
      }
    </style>
  </head>

  <body
    class="bg-obsidian text-champagne/70 selection:bg-gold selection:text-obsidian min-h-screen flex items-center justify-center py-12"
  >
    <div class="absolute inset-0 bg-hero bg-cover bg-center bg-no-repeat opacity-20">
      <div class="absolute inset-0 bg-black/80"></div>
    </div>

    <div class="relative z-10 w-full max-w-md mx-auto p-8">
      <div class="bg-black/70 border border-gold p-10 rounded-xl shadow-lg space-y-6">
        <h1 class="text-4xl font-bold text-gold text-center stylized-brand mb-2">
          Mon Amour Grand
        </h1>
        <h2 class="text-2xl font-semibold text-champagne text-center mb-6">
          Create Account
        </h2>

        <div id="errorMessage" class="hidden bg-[#140808]/50 border border-red-500/50 text-red-400 p-4 rounded-md text-sm">
        </div>

        <div id="successMessage" class="hidden bg-green-900/50 border border-green-500/50 text-green-400 p-4 rounded-md text-sm">
        </div>

        <form id="signupForm" class="space-y-6">
          <div class="space-y-2">
            <label class="text-sm md:text-base font-semibold text-champagne"
              >Full Name</label
            >
            <input
              type="text"
              id="fullName"
              required
              class="w-full p-3 bg-[#0d0d0e] border border-white/10 text-champagne rounded-md focus:border-gold focus:outline-none"
              placeholder="John Doe"
            />
          </div>

          <div class="space-y-2">
            <label class="text-sm md:text-base font-semibold text-champagne"
              >Email</label
            >
            <input
              type="email"
              id="email"
              required
              class="w-full p-3 bg-[#0d0d0e] border border-white/10 text-champagne rounded-md focus:border-gold focus:outline-none"
              placeholder="your.email@example.com"
            />
          </div>

          <div class="space-y-2">
            <label class="text-sm md:text-base font-semibold text-champagne"
              >Password</label
            >
            <input
              type="password"
              id="password"
              required
              minlength="6"
              class="w-full p-3 bg-[#0d0d0e] border border-white/10 text-champagne rounded-md focus:border-gold focus:outline-none"
              placeholder="••••••••"
            />
            <p class="text-xs text-champagne/50">Must be at least 6 characters</p>
          </div>

          <div class="space-y-2">
            <label class="text-sm md:text-base font-semibold text-champagne"
              >Confirm Password</label
            >
            <input
              type="password"
              id="confirmPassword"
              required
              class="w-full p-3 bg-[#0d0d0e] border border-white/10 text-champagne rounded-md focus:border-gold focus:outline-none"
              placeholder="••••••••"
            />
          </div>

          <button
            type="submit"
            class="btn-shimmer bg-gold text-black w-full py-4 font-black uppercase tracking-widest text-lg"
          >
            Sign Up
          </button>
        </form>

        <div class="text-center space-y-2">
          <p class="text-champagne/70 text-sm">
            Already have an account?
            <a href="login.html" class="text-gold hover:underline font-semibold"
              >Login</a
            >
          </p>
          <a
            href="stak.html"
            class="text-champagne/60 hover:text-gold text-sm transition-colors"
            >← Back to Home</a
          >
        </div>
      </div>
    </div>

    <script>
      const signupForm = document.getElementById('signupForm');
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');

      signupForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Hide previous messages
        errorMessage.classList.add('hidden');
        successMessage.classList.add('hidden');

        // Validation
        if (password.length < 6) {
          errorMessage.classList.remove('hidden');
          errorMessage.textContent = 'Password must be at least 6 characters long.';
          return;
        }

        if (password !== confirmPassword) {
          errorMessage.classList.remove('hidden');
          errorMessage.textContent = 'Passwords do not match. Please try again.';
          return;
        }

        // Get existing users from localStorage
        const users = JSON.parse(localStorage.getItem('users')) || [];

        // Check if user already exists
        if (users.find(u => u.email === email)) {
          errorMessage.classList.remove('hidden');
          errorMessage.textContent = 'An account with this email already exists. Please login instead.';
          return;
        }

        // Create new user
        const newUser = {
          id: Date.now(),
          name: fullName,
          email: email,
          password: password,
          createdAt: new Date().toISOString()
        };

        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));

        // Auto-login after signup
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('currentUser', JSON.stringify(newUser));

        successMessage.classList.remove('hidden');
        successMessage.textContent = 'Account created successfully! Redirecting...';

        setTimeout(() => {
          window.location.href = 'stak.html';
        }, 1000);
      });
    </script>
  </body>
</html>
